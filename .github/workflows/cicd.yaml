name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 🔹 Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔹 Step 2: Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Step 3: Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_IMAGE }}:latest .

    # 🔹 Step 4: Push Image to Docker Hub
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_IMAGE }}:latest

    # 🔹 Step 5: Deploy on EC2 via SSH
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Pull latest image
          docker pull ${{ secrets.DOCKER_IMAGE }}:latest

          # Stop old container
          docker stop reddit-container || true
          docker rm reddit-container || true

          # Run new container
          docker run -d -p 80:5000 \
            --name reddit-container \
            ${{ secrets.DOCKER_IMAGE }}:latest